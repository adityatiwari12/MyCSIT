name: mycsit
description: MyCSIT - Student Intelligence Platform for CSIT Department, AITR
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^1.10.3

  # State Management
  flutter_riverpod: ^2.3.6

  # Navigation
  go_router: ^12.1.3

  # UI & Styling
  cupertino_icons: ^1.0.5
  google_fonts: ^6.1.0

  # Image Handling
  cached_network_image: ^3.2.3
  image_picker: ^1.0.4

  # File Handling
  file_picker: ^6.1.1
  flutter_image_compress: ^2.0.4

  # Utilities
  uuid: ^3.0.7
  intl: ^0.18.1
  url_launcher: ^6.1.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/

  # Fonts
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600

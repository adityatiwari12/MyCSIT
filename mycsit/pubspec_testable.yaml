name: mycsit
description: MyCSIT - Student Intelligence Platform for CSIT Department, AITR
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Basic dependencies that work without web plugins
  flutter_riverpod: ^2.3.6
  cupertino_icons: ^1.0.5
  uuid: ^3.0.7
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
